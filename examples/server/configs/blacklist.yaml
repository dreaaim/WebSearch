blacklist:
  - domain: "金融界"
    reason: "使用标题党、夸张词汇发布涉企虚假不实新闻，集纳企业负面信息，恶意诋毁抹黑企业"
    severity: high

  - domain: "中访网"
    reason: "使用标题党、夸张词汇发布涉企虚假不实新闻，集纳企业负面信息，恶意诋毁抹黑企业"
    severity: high

  - domain: "全球财说"
    reason: "使用标题党、夸张词汇发布涉企虚假不实新闻，集纳企业负面信息，恶意诋毁抹黑企业"
    severity: high

  - domain: "国际投行研究报告"
    reason: "歪曲解读涉企公开信息，恶意集纳炒作上市公司负面信息，诋毁企业形象声誉"
    severity: high

  - domain: "IPO超级情报局"
    reason: "歪曲解读涉企公开信息，恶意集纳炒作拟上市公司负面信息"
