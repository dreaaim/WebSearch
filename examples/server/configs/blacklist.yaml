  - domain: "博望财经"
    reason: "歪曲解读企业财务报表，恶意唱衰企业经营状况"
    severity: high

  - domain: "固收嘚啵李"
    reason: "捏造金融机构业绩爆雷、产品兑付逾期等虚假不实信息"
    severity: high

  - domain: "钞票不睡觉"
    reason: "以标题党形式发布炒作金融机构虚假不实信息"
    severity: high

  - domain: "首席商业智慧"
    reason: "发布炒作银行、信托等金融机构虚假不实信息"
    severity: high

  - domain: "九号财经"
    reason: "以标题党形式发布炒作金融机构虚假不实信息"
    severity: high

  - domain: "通信圈"
    reason: "以茶水费、商业合作名义向企业索取高额费用，威胁发布虚假不实信息"
    severity: high

  - domain: "券业行家"
    reason: "集纳发布涉企负面信息，以商业合作名义敲诈勒索"
    severity: high

  - domain: "煤文化"
    reason: "集纳发布涉企负面信息，进行敲诈勒索"
    severity: high

  - domain_pattern: "*大眼哥*"
    reason: "汽车领域网络黑嘴，长期恶意诋毁车企、辱骂企业家"
    severity: high

  - domain_pattern: "*电电加电*"
    reason: "汽车领域网络黑嘴，长期恶意诋毁车企"
    severity: high

  - domain_pattern: "*王悟空说车*"
    reason: "汽车领域商誉诋毁，被封禁后换马甲王武松继续违规"
    severity: high

  - domain_pattern: "*大嘴博士*"
    reason: "美妆领域发布炒作测评信息，误导消费者，干扰市场竞争秩序"
    severity: high

  - domain_pattern: "*article-farm*"
    reason: "内容农场"
    severity: medium

  - domain_pattern: "*clickbait*"
    reason: "标题党"
    severity: low

  - domain_pattern: "*采集器*"
    reason: "机器采集内容"
    severity: medium
